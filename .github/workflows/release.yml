name: Build & Release

# 传输策略（永久生效）
# 国际上传只做一次（美国 → Gitee），后续国内全并行分发，不再重复跨海
# GitHub 编译 → Gitee（唯一跨海）→ GitCode 等国内平台从 Gitee CDN 取
#
# ┌─ GitHub（美国编译）──────┐
# │  ① 编译 .exe            │
# │  ② 创建 GitHub Release   │
# └────────┬─────────────────┘
#          ↓ 唯一一次国际上传
# ┌─ Gitee（国内）───────────┐
# │  ③ 上传 .exe（跨海）      │
# └────────┬─────────────────┘
#    ┌─────┴──────┐  ← 国内全并行
#    ↓            ↓
# GitCode   (未来其他平台)

on:
  push:
    branches: [master]
    tags:
      - 'v*'

jobs:
  build:
    name: Build Windows EXE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install mingw-w64 (CGO cross-compiler for go-sqlite3)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 mingw-w64-tools

      - name: Init go.mod
        run: |
          go mod init modbusrtu_broker
          go mod tidy

      - name: Build EXE (CGO cross-compile for go-sqlite3)
        run: |
          BUILD_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')
          sed -i "s/编译时间: [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\} [0-9]\{2\}:[0-9]\{2\}/编译时间: ${BUILD_TIME}/" modbusrtu_broker.go
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc \
          CGO_CFLAGS="-D_WIN32" CGO_LDFLAGS="-lws2_32" \
          go build -ldflags '-s -w -extldflags=-static' -o modbusrtu_broker.exe modbusrtu_broker.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-modbus-windows-amd64
          path: modbusrtu_broker.exe

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: one-modbus-windows-amd64

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "# one-modbus $VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "- Windows amd64 单文件 exe，无需安装，解压即用" >> release_notes.md
          echo "- 配置方法：同级目录放 项目变量信息.xlsx（没有会自动生成模板）" >> release_notes.md
          echo "- 双击 modbusrtu_broker.exe 启动" >> release_notes.md
          echo "- 浏览器打开 http://127.0.0.1:53046/统计 即可进入" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: one-modbus ${{ github.ref_name }}
          body_path: release_notes.md
          files: modbusrtu_broker.exe
          draft: false
          prerelease: false

      - name: Upload release notes for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  sync-gitee:
    name: Sync to Gitee
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: one-modbus-windows-amd64
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
      - name: Upload to Gitee
        env:
          TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          BODY=$(cat release_notes.md | jq -Rs .)
          echo "Create Gitee release..."
          RESP=$(curl -s -X POST "https://gitee.com/api/v5/repos/dingjiazhi/one-modbus/releases" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\":\"${TOKEN}\",\"tag_name\":\"${TAG}\",\"name\":\"one-modbus ${TAG}\",\"body\":${BODY},\"target_commitish\":\"master\"}")
          RID=$(echo "$RESP" | jq -r '.id // "null"')
          if [ "$RID" != "null" ]; then
            echo "Upload exe to Gitee..."
            curl -s -X POST "https://gitee.com/api/v5/repos/dingjiazhi/one-modbus/releases/${RID}/attach_files" \
              -F "access_token=${TOKEN}" \
              -F "file=@modbusrtu_broker.exe"
          else
            echo "Gitee response: $RESP"
          fi

  sync-gitcode:
    name: Sync to GitCode (artifact + Gitee CDN)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, release, sync-gitee]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: one-modbus-windows-amd64
      - uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Upload release notes to GitCode
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # 检查是否已有同名 release（避免重复创建报错）
          echo "::group::Check existing GitCode release"
          EXISTING=$(curl -sS --connect-timeout 30 --max-time 30 \
            "https://api.gitcode.com/api/v5/repos/weixin_45444393/one-modbus/releases/tags/${TAG}" \
            -H "Authorization: Bearer ${GITCODE_TOKEN}")
          EXISTING_ID=$(echo "$EXISTING" | jq -r '.id // empty')
          echo "::endgroup::"

          if [ -n "$EXISTING_ID" ]; then
            echo "Release ${TAG} already exists (id=$EXISTING_ID), skip creation"
            echo "$EXISTING_ID" > /tmp/gitcode_release_id.txt
          else
            echo "::group::Create GitCode release via v5 API"
            # 用 jq --arg 构建 JSON，避免 shell 转义问题
            jq -n --arg tag "$TAG" --arg name "one-modbus $TAG" \
              --arg body "$(cat release_notes.md)" \
              '{tag_name: $tag, name: $name, body: $body, target_commitish: "master"}' \
              > /tmp/gitcode_release_payload.json

            RESP=$(curl -sS --connect-timeout 30 --max-time 60 -X POST \
              "https://api.gitcode.com/api/v5/repos/weixin_45444393/one-modbus/releases" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${GITCODE_TOKEN}" \
              -d @/tmp/gitcode_release_payload.json)
            echo "Response:"
            echo "$RESP" | jq '{id, tag_name, name, message}' 2>/dev/null || echo "$RESP"
            echo "::endgroup::"

            CREATED_ID=$(echo "$RESP" | jq -r '.id // empty')
            if [ -n "$CREATED_ID" ]; then
              echo "Created release id=$CREATED_ID"
              echo "$CREATED_ID" > /tmp/gitcode_release_id.txt
            else
              echo "ERROR: Create release failed."
              exit 1
            fi
          fi

      - name: Upload exe to GitCode (from Gitee CDN, fallback to artifact)
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # 优先从 Gitee CDN 下载（国内快），失败才用 artifact
          echo "Try to download exe from Gitee CDN..."
          GITEE_INFO=$(curl -s "https://gitee.com/api/v5/repos/dingjiazhi/one-modbus/releases/tags/${TAG}")
          EXE_URL=$(echo "$GITEE_INFO" | jq -r '.assets[] | select(.name | endswith(".exe")) | .browser_download_url // empty')
          if [ -n "$EXE_URL" ]; then
            echo "Download from Gitee CDN: $EXE_URL"
            curl -sL -o /tmp/modbusrtu_broker.exe "$EXE_URL"
          else
            echo "Gitee CDN not available, use local artifact"
            cp modbusrtu_broker.exe /tmp/modbusrtu_broker.exe
          fi
          ls -la /tmp/modbusrtu_broker.exe

          # 获取 release ID（优先从上一步缓存读，避免重复查询）
          RELEASE_ID=$(cat /tmp/gitcode_release_id.txt 2>/dev/null)
          if [ -z "$RELEASE_ID" ]; then
            echo "Get GitCode release info by tag..."
            RELEASE_INFO=$(curl -s --connect-timeout 30 --max-time 30 \
              "https://api.gitcode.com/api/v5/repos/weixin_45444393/one-modbus/releases/tags/${TAG}" \
              -H "Authorization: Bearer ${GITCODE_TOKEN}")
            RELEASE_ID=$(echo "$RELEASE_INFO" | jq -r '.id // empty')
          fi
          if [ -z "$RELEASE_ID" ]; then
            echo "Failed to get release ID. Exiting."
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"

          echo "Get upload URL by release ID..."
          UPLOAD_URL=$(curl -s --connect-timeout 30 --max-time 30 \
            "https://api.gitcode.com/api/v5/repos/weixin_45444393/one-modbus/releases/${RELEASE_ID}/upload_url" \
            -H "Authorization: Bearer ${GITCODE_TOKEN}" | jq -r '.upload_url // empty')
          if [ -z "$UPLOAD_URL" ]; then
            echo "Failed to get upload URL. Response:"
            curl -s "https://api.gitcode.com/api/v5/repos/weixin_45444393/one-modbus/releases/${RELEASE_ID}/upload_url" \
              -H "Authorization: Bearer ${GITCODE_TOKEN}" | jq .
            exit 1
          fi
          echo "Upload URL: $UPLOAD_URL"

          echo "Upload exe to GitCode..."
          UPLOAD_RESP=$(curl -s --connect-timeout 30 --max-time 120 -X PUT "$UPLOAD_URL" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@/tmp/modbusrtu_broker.exe")
          echo "$UPLOAD_RESP" | jq '{name, size, state, message}' 2>/dev/null || echo "$UPLOAD_RESP"
          echo ""
          echo "✅ GitCode upload complete"
